<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>4wheelMeal Kick Math Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: 'Arial Black', Impact, sans-serif;
            color: #ffffff;
            -webkit-user-select: none;
            user-select: none;
        }

        #widget-container {
            display: flex;
            gap: 20px;
            width: 900px;
            height: 320px;
            background: rgba(0, 0, 0, 0.75);
            padding: 25px;
            border-radius: 16px;
            border: 3px solid #53fc18;
            box-shadow: 0 0 25px rgba(83, 252, 24, 0.4), inset 0 0 15px rgba(83, 252, 24, 0.1);
            box-sizing: border-box;
            position: relative;
        }

        .box {
            flex: 1;
            background: rgba(15, 15, 15, 0.85);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .box-left {
            flex: 1.4;
        }

        .box-right {
            flex: 1;
        }

        h2 {
            margin: 0 0 10px 0;
            color: #53fc18;
            text-transform: uppercase;
            font-size: 20px;
            letter-spacing: 1.5px;
            text-shadow: 0 0 8px rgba(83, 252, 24, 0.5);
        }

        #question {
            font-size: 52px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            margin: auto 0;
        }

        #last-winner {
            font-size: 15px;
            color: #aaaaaa;
            margin-top: auto;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px;
            border-radius: 6px;
        }

        #winner-name {
            color: #53fc18;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(83, 252, 24, 0.5);
        }

        ol {
            text-align: left;
            margin: 0;
            padding-left: 20px;
            font-size: 18px;
            list-style-type: decimal;
        }

        li {
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding-bottom: 4px;
            font-family: sans-serif;
            font-weight: bold;
        }

        li::marker {
            color: #53fc18;
            font-family: 'Arial Black', sans-serif;
        }

        li span.score-val {
            color: #53fc18;
            float: right;
            font-family: 'Arial Black', sans-serif;
            text-shadow: 0 0 5px rgba(83, 252, 24, 0.3);
        }

        /* Skrytý popout chat na pozadí, který čte zprávy */
        #kick-chat-loader {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            bottom: 0;
            left: 0;
            border: none;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="widget-container">
    <div class="box box-left">
        <h2>Vyřeš příklad!</h2>
        <div id="question">Načítání hry...</div>
        <div id="last-winner">Minulé kolo: <span id="winner-name">-</span></div>
    </div>

    <div class="box box-right">
        <h2>TOP 5 Šprti</h2>
        <ol id="leaderboard">
            <li>Nikdo zatím nebodoval</li>
        </ol>
    </div>
</div>

<iframe id="kick-chat-loader" src="https://kick.com/popout/4wheelmeal/chat"></iframe>

<script>
    let currentAnswer = null;
    let scores = {};

    function generateQuestion() {
        const num1 = Math.floor(Math.random() * 101);
        const num2 = Math.floor(Math.random() * 101);
        const operators = ['+', '-'];
        const operator = operators[Math.floor(Math.random() * operators.length)];
        
        if (operator === '+') {
            currentAnswer = num1 + num2;
        } else {
            if (num1 < num2) return generateQuestion(); // Žádná záporná čísla
            currentAnswer = num1 - num2;
        }

        document.getElementById('question').innerHTML = `${num1} ${operator} ${num2} = ?`;
    }

    function updateLeaderboard() {
        const leaderboardEl = document.getElementById('leaderboard');
        leaderboardEl.innerHTML = '';

        const sorted = Object.entries(scores)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5);

        if (sorted.length === 0) {
            leaderboardEl.innerHTML = '<li style="list-style:none; text-align:center; color:#666; margin-top:40px;">Nikdo zatím nebodoval</li>';
            return;
        }

        sorted.forEach(([user, score]) => {
            const li = document.createElement('li');
            li.innerHTML = `${user} <span class="score-val">${score}</span>`;
            leaderboardEl.appendChild(li);
        });
    }

    // Sledování zpráv přes bezpečné okno prohlížeče
    window.addEventListener('message', (event) => {
        // Kontrola, zda zpráva přichází z Kick popout okna
        if (event.origin.includes('kick.com') || event.data.type === 'kick_message') {
            let user = event.data.user;
            let rawMessage = event.data.text;

            // Pokročilé parsování pokud Kick posílá data jako objekt/JSON
            if (event.data.data && event.data.data.content) {
                user = event.data.data.sender.username;
                rawMessage = event.data.data.content;
            }

            if (!user || !rawMessage) return;

            const message = rawMessage.trim();
            const chatNumber = parseInt(message, 10);

            if (!isNaN(chatNumber) && chatNumber === currentAnswer && message === chatNumber.toString()) {
                scores[user] = (scores[user] || 0) + 1;

                document.getElementById('winner-name').innerText = `${user} (+1b)`;
                updateLeaderboard();

                currentAnswer = null;
                document.getElementById('question').innerHTML = `<span style="color:#53fc18; font-size:38px;">Správně!</span>`;
                
                setTimeout(() => {
                    generateQuestion();
                }, 2000);
            }
        }
    });

    // Spuštění při načtení
    setTimeout(() => {
        generateQuestion();
        updateLeaderboard();
    }, 1000);
</script>

</body>
</html>
