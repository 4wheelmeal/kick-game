<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>4wheelMeal Kick Math Game</title>
    <style>
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; font-family: 'Arial Black', Impact, sans-serif; }
        #widget-container { display: flex; gap: 20px; width: 850px; height: 280px; background: rgba(0, 0, 0, 0.9); padding: 20px; border-radius: 15px; border: 3px solid #53fc18; box-shadow: 0 0 20px rgba(83, 252, 24, 0.3); box-sizing: border-box; }
        .box { flex: 1; background: rgba(15, 15, 15, 0.95); border-radius: 12px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; }
        h2 { margin: 0 0 5px 0; color: #53fc18; text-transform: uppercase; font-size: 18px; letter-spacing: 1px; }
        #question { font-size: 44px; font-weight: bold; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.3); margin: auto 0; }
        #last-winner { font-size: 14px; color: #aaaaaa; margin-top: auto; }
        #winner-name { color: #53fc18; font-weight: bold; }
        ol { text-align: left; margin: 0; padding-left: 25px; font-size: 16px; color: #fff; list-style-type: decimal; }
        li { margin-bottom: 6px; }
        li span { color: #53fc18; float: right; font-size: 15px; }
    </style>
</head>
<body>

<div id="widget-container">
    <div class="box">
        <h2>Vyřeš příklad!</h2>
        <div id="question">Čekám na chat...</div>
        <div id="last-winner">Minulé kolo: <span id="winner-name">-</span></div>
    </div>
    <div class="box">
        <h2>TOP 5 Šprti</h2>
        <ol id="leaderboard"><li>Nikdo zatím nebodoval</li></ol>
    </div>
</div>

<script>
    let currentAnswer = null;
    let scores = {};

    function generateQuestion() {
        const num1 = Math.floor(Math.random() * 40) + 1;
        const num2 = Math.floor(Math.random() * 40) + 1;
        const operators = ['+', '-'];
        const operator = operators[Math.floor(Math.random() * operators.length)];
        currentAnswer = (operator === '+') ? (num1 + num2) : (num1 - num2);
        document.getElementById('question').style.fontSize = "44px";
        document.getElementById('question').innerText = `${num1} ${operator} ${num2} = ?`;
    }

    function updateLeaderboard() {
        const leaderboardEl = document.getElementById('leaderboard');
        leaderboardEl.innerHTML = '';
        const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]).slice(0, 5);
        if (sorted.length === 0) {
            leaderboardEl.innerHTML = '<li>Nikdo zatím nebodoval</li>';
            return;
        }
        sorted.forEach(([user, score]) => {
            const li = document.createElement('li');
            li.innerHTML = `${user} <span>${score} b</span>`;
            leaderboardEl.appendChild(li);
        });
    }

    // Naslouchání zprávám z "čtečky" chatu
    window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'kick_chat_msg') {
            const user = event.data.user;
            const message = event.data.text.trim();
            const chatNumber = parseInt(message, 10);

            if (!isNaN(chatNumber) && chatNumber === currentAnswer && message === chatNumber.toString()) {
                scores[user] = (scores[user] || 0) + 1;
                document.getElementById('winner-name').innerText = `${user} (+1b)`;
                updateLeaderboard();
                currentAnswer = null;
                setTimeout(generateQuestion, 2000);
            }
        }
    });

    // Spustíme první příklad (už nečekáme na žádnou síť!)
    generateQuestion();
    updateLeaderboard();
</script>
</body>
</html>
