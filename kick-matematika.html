<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>4wheelMeal Kick Math Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden;
            font-family: 'Arial Black', Impact, sans-serif;
            color: #ffffff;
            -webkit-user-select: none;
            user-select: none;
        }

        #widget-container {
            display: flex;
            gap: 20px;
            width: 900px;
            height: 320px;
            background: rgba(0, 0, 0, 0.75);
            padding: 25px;
            border-radius: 16px;
            border: 3px solid #53fc18;
            box-shadow: 0 0 25px rgba(83, 252, 24, 0.4), inset 0 0 15px rgba(83, 252, 24, 0.1);
            box-sizing: border-box;
        }

        .box {
            flex: 1;
            background: rgba(15, 15, 15, 0.85);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .box-left {
            flex: 1.4;
        }

        .box-right {
            flex: 1;
        }

        h2 {
            margin: 0 0 10px 0;
            color: #53fc18;
            text-transform: uppercase;
            font-size: 20px;
            letter-spacing: 1.5px;
            text-shadow: 0 0 8px rgba(83, 252, 24, 0.5);
        }

        #question {
            font-size: 52px;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            margin: auto 0;
        }

        .status-msg {
            font-size: 22px;
            color: #aaaaaa;
            font-family: sans-serif;
            font-weight: bold;
        }

        #last-winner {
            font-size: 15px;
            color: #aaaaaa;
            margin-top: auto;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px;
            border-radius: 6px;
        }

        #winner-name {
            color: #53fc18;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(83, 252, 24, 0.5);
        }

        ol {
            text-align: left;
            margin: 0;
            padding-left: 20px;
            font-size: 18px;
            list-style-type: decimal;
        }

        li {
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding-bottom: 4px;
            font-family: sans-serif;
            font-weight: bold;
        }

        li::marker {
            color: #53fc18;
            font-family: 'Arial Black', sans-serif;
        }

        li span.score-val {
            color: #53fc18;
            float: right;
            font-family: 'Arial Black', sans-serif;
            text-shadow: 0 0 5px rgba(83, 252, 24, 0.3);
        }
    </style>
</head>
<body>

<div id="widget-container">
    <div class="box box-left">
        <h2>Vyřeš příklad!</h2>
        <div id="question"><span class="status-msg">Připojování...</span></div>
        <div id="last-winner">Minulé kolo: <span id="winner-name">-</span></div>
    </div>

    <div class="box box-right">
        <h2>TOP 5 Šprti</h2>
        <ol id="leaderboard">
            <li>Čeká se na body...</li>
        </ol>
    </div>
</div>

<script>
    const KICK_CHANNEL_ID = "3314051"; // ID pro 4wheelmeal
    
    let currentAnswer = null;
    let scores = {};
    let ws = null;
    
    // Nastavení pro exponenciální backoff reconnect podle zadání
    let reconnectDelay = 3000; 
    const MAX_RECONNECT_DELAY = 60000; 
    let reconnectTimer = null;

    function generateQuestion() {
        // Rozsah 0 - 100 podle zadání
        const num1 = Math.floor(Math.random() * 101);
        const num2 = Math.floor(Math.random() * 101);
        const operators = ['+', '-'];
        const operator = operators[Math.floor(Math.random() * operators.length)];
        
        if (operator === '+') {
            currentAnswer = num1 + num2;
            if (currentAnswer > 100) return generateQuestion(); // Udržujeme strop do 100
        } else {
            if (num1 < num2) return generateQuestion(); // Žádná záporná čísla
            currentAnswer = num1 - num2;
        }

        document.getElementById('question').innerHTML = `${num1} ${operator} ${num2} = ?`;
    }

    function updateLeaderboard() {
        const leaderboardEl = document.getElementById('leaderboard');
        leaderboardEl.innerHTML = '';

        const sorted = Object.entries(scores)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5);

        if (sorted.length === 0) {
            leaderboardEl.innerHTML = '<li style="list-style:none; text-align:center; color:#666; margin-top:40px;">Čeká se na body...</li>';
            return;
        }

        sorted.forEach(([user, score]) => {
            const li = document.createElement('li');
            li.innerHTML = `${user} <span class="score-val">${score}</span>`;
            leaderboardEl.appendChild(li);
        });
    }

    function initKickConnection() {
        if (reconnectTimer) clearTimeout(reconnectTimer);
        
        // Připojení na oficiální veřejný Pusher cluster, který Kick používá
        ws = new WebSocket('wss://ws-us2.pusher.com/app/eb1d5f283081a78b93b4?protocol=7&client=js&version=7.6.0&flash=false');

        ws.onopen = () => {
            // Po úspěšném spojení vyresetujeme čekací dobu zpět na 3s
            reconnectDelay = 3000; 

            // Přihlášení k chatu kanálu
            const subscribeMsg = {
                event: "pusher:subscribe",
                data: {
                    channel: `chatrooms.${KICK_CHANNEL_ID}.v2`
                }
            };
            ws.send(JSON.stringify(subscribeMsg));
        };

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            
            // Jakmile nás Pusher úspěšně přihlásí do místnosti
            if (msg.event === "pusher_internal:subscription_succeeded") {
                if (currentAnswer === null) {
                    generateQuestion();
                    updateLeaderboard();
                }
                return;
            }

            // Odchycení zpráv z chatu
            if (msg.event === "App\\Events\\ChatMessageEvent") {
                const chatData = JSON.parse(msg.data);
                
                if (chatData && chatData.sender && chatData.content) {
                    const user = chatData.sender.username;
                    const text = chatData.content.trim();
                    const chatNumber = parseInt(text, 10);

                    // Kontrola správné odpovědi
                    if (!isNaN(chatNumber) && chatNumber === currentAnswer && text === chatNumber.toString()) {
                        scores[user] = (scores[user] || 0) + 1;

                        // Zobrazení: Minulé kolo: USERNAME (+1b) podle zadání
                        document.getElementById('winner-name').innerText = `${user} (+1b)`;
                        updateLeaderboard();

                        currentAnswer = null;
                        document.getElementById('question').innerHTML = `<span style="color:#53fc18; font-size:38px;">Správně!</span>`;
                        
                        // Počkat 2 sekundy a vygenerovat nový příklad
                        setTimeout(() => {
                            generateQuestion();
                        }, 2000);
                    }
                }
            }
        };

        ws.onclose = () => {
            document.getElementById('question').innerHTML = `<span class="status-msg">Spojení přerušeno. Reconnect...</span>`;
            
            // Exponenciální backoff: 3s -> 6s -> 12s -> ...
            reconnectTimer = setTimeout(() => {
                initKickConnection();
                reconnectDelay = Math.min(reconnectDelay * 2, MAX_RECONNECT_DELAY);
            }, reconnectDelay);
        };

        ws.onerror = () => {
            ws.close();
        };
    }

    // Spuštění widgetu
    initKickConnection();
</script>

</body>
</html>
